<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Playlists</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
<a class="home-btn">← ACCUEIL</a>
  <div class="top-bar">
    <span class="badge">✦ CURATED FOR YOUR MOOD</span>
    <a class="regen">Regenerate</a>
  </div>

  <h1 class="title">
    Playlists for <span class="mood-name"></span>
  </h1>

  <p class="subtitle">
    We've crafted these playlists just for you. Tap any to start listening.
  </p>

  <div class="loader" id="loader">
    <div class="loader-spinner"></div>
    <p>Crafting your playlists...</p>
  </div>

  <div class="cards" id="cards" style="display: none;"></div>

</div>

<div class="account-menu">
  <button class="account-btn" id="account-btn">
    <span class="account-avatar" id="account-avatar"></span>
    <span id="account-name"></span>
    ▾
  </button>
  <div class="account-dropdown" id="account-dropdown">
    <a href="/dashboard">Dashboard</a>
    <button class="logout-item" id="logout-btn">Sign out</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
