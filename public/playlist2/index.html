<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Playlist</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">

  <div class="back">←</div>

  <div class="playlist-header">

    <img class="cover" src="https://picsum.photos/300?6">

    <div class="info">
      <span class="label">PLAYLIST</span>
      <h1>Day Dreamer</h1>
      <p>Gentle tracks for when your mind wanders back.</p>
    </div>

  </div>

  <button class="play-btn">▶</button>

  <table class="tracklist">

    <thead>
      <tr>
        <th>#</th>
        <th>TITLE</th>
        <th>ALBUM</th>
        <th></th>
      </tr>
    </thead>

    <tbody>

      <tr>
        <td>1</td>
        <td>
          <strong>Sailor Song</strong><br>
          <span>Gigi Perz</span>
        </td>
        <td>Sailor Song</td>
        <td>3:31</td>
      </tr>

      <tr>
        <td>2</td>
        <td>
          <strong>Run</strong><br>
          <span>Ludovico Einaudi</span>
        </td>
        <td>In A Time Lapse</td>
        <td>5:32</td>
      </tr>

      <tr>
        <td>3</td>
        <td>
          <strong>Chamber Of Reflection</strong><br>
          <span>Mac DeMarco</span>
        </td>
        <td>Salad Days</td>
        <td>3:51</td>
      </tr>

    </tbody>

  </table>

</div>
</body>
</html>
