<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Playlist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <div class="back">←</div>

  <div class="playlist-header">
    <img class="cover" src="https://picsum.photos/300?6">
    <div class="info">
      <span class="label">PLAYLIST</span>
      <h1>Day Dreamer</h1>
      <p>Gentle tracks for when your mind wanders back.</p>
    </div>
  </div>

  <div class="action-btns">
    <button class="play-btn">▶</button>
    <button class="fav-btn">♡ Add to favorites</button>
  </div>

  <table class="tracklist">
    <thead>
      <tr>
        <th>#</th>
        <th>TITLE</th>
        <th>ALBUM</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<div class="account-menu">
  <button class="account-btn" id="account-btn">
    <span class="account-avatar" id="account-avatar"></span>
    <span id="account-name"></span>
    ▾
  </button>
  <div class="account-dropdown" id="account-dropdown">
    <a href="/dashboard">Dashboard</a>
    <button class="logout-item" id="logout-btn">Sign out</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
