<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />   
    <title>Feel - Accueil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">

    <div class="logo">
      <div class="icon">🎵</div>
      <span>Feel</span>
    </div>

    <h1>
      How are you <span class="highlight">feeling</span><br />
      today?
    </h1>

    <p class="subtitle">
      Tell us your mood and we'll craft the perfect playlist for you.
    </p>

    <div class="input-box">
      <input type="text" placeholder="I’m feeling..." />
    </div>

    <div class="chips">
      <button>Happy and energetic</button>
      <button>Feeling nostalgic</button>
      <button>Sad and reflective</button>
      <button>Ready to party</button>
      <button>Chill and relaxed</button>
      <button>Focused and motivated</button>
    </div>

  </div>

  <div class="account-menu">
  <button class="account-btn" id="account-btn">
    <span class="account-avatar" id="account-avatar"></span>
    <span id="account-name"></span>
    ▾
  </button>
  <div class="account-dropdown" id="account-dropdown">
    <a href="/dashboard">Dashboard</a>
    <button class="logout-item" id="logout-btn">Sign out</button>
  </div>
</div>

<!--<button class="logout">Se déconnecter</button>-->
<script src="script.js"></script>
</body>
</html>
