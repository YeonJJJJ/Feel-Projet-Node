<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="kk"></div>

<button onclick="addMusic()">Ajouter musique</button>
    <script>
    const kk = document.querySelector(".kk");

let url = "http://localhost:3000/addTrack";

fetch(url, {
  method: "post",
  headers: new Headers({
    "Content-type": "application/json",
  }),
  body: JSON.stringify({
    trackName: "Blinding Lights"
  })
})
  .then(function (response) {
    return response.json();
  })
  .then(function (jsonResponse) {
    console.log(jsonResponse);

    kk.innerHTML =
      jsonResponse.track.name +
      " - " +
      jsonResponse.track.artist;
  });
</script>
  </body>
</html>
